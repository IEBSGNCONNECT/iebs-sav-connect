<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEBS SAV Connect — Gestionnaire</title>
<link rel="manifest" href="manifest-gestionnaire.json">
<meta name="theme-color" content="#0A1B5C">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IEBS Gestionnaire">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>

:root{
  --navy:#14309E; --navy-dark:#0A1B5C; --navy-light:#4C63C4;
  --red:#D91E36; --red-dark:#A8142A;
  --steel:#8B93A1; --steel-light:#DCE1E9;
  --graphite:#20242B; --ink:#454B56;
  --fog:#F3F5F9; --white:#FFFFFF;
  --success:#187A54; --success-bg:#E4F5EC;
  --amber:#B4740E; --amber-bg:#FBF0DC;
  --danger-bg:#FBE6E9;
  --radius:7px; --radius-lg:12px;
  --shadow:0 1px 2px rgba(20,48,158,.06), 0 4px 16px rgba(20,48,158,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif; color:var(--graphite); background:var(--fog);
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; margin:0; letter-spacing:-.01em;}
.mono{font-family:'IBM Plex Mono',monospace;}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
.hidden{display:none !important;}
::selection{background:var(--navy); color:#fff;}

/* ---------- Layout shells ---------- */
#app{min-height:100vh; display:flex; flex-direction:column;}
.view{flex:1; display:flex; flex-direction:column;}
.wrap{width:100%; max-width:960px; margin:0 auto; padding:0 20px;}
.wrap-wide{width:100%; max-width:1180px; margin:0 auto; padding:0 20px;}

/* ---------- Signature swoosh divider ---------- */
.swoosh{height:5px; width:100%; background:linear-gradient(90deg,var(--navy) 0%, var(--navy) 38%, var(--red) 55%, var(--steel) 78%, var(--steel-light) 100%); border-radius:0;}
.swoosh-thin{height:3px;}

/* ---------- Top bar (role sessions) ---------- */
#topbar{background:var(--navy-dark); color:#fff; display:none;}
#topbar.show{display:block;}
.topbar-inner{display:flex; align-items:center; justify-content:space-between; padding:12px 20px; max-width:1180px; margin:0 auto; gap:12px; flex-wrap:wrap;}
.topbar-brand{display:flex; align-items:center; gap:10px;}
.topbar-brand img{height:24px; width:auto; background:#fff; padding:4px 9px; border-radius:5px; display:block;}
.topbar-role{font-size:12.5px; color:#B9C3EA; font-family:'IBM Plex Mono',monospace;}
.topbar-actions{display:flex; align-items:center; gap:14px;}
.btn-ghost-light{background:none; border:1px solid rgba(255,255,255,.3); color:#fff; padding:7px 14px; border-radius:var(--radius); font-size:13.5px; font-weight:500;}
.btn-ghost-light:hover{background:rgba(255,255,255,.1);}

/* ---------- Home hero ---------- */
.hero{padding:56px 20px 44px; text-align:center; background:linear-gradient(160deg,var(--navy-dark) 0%, var(--navy) 100%);}
.hero-logo{height:64px; width:auto; margin-bottom:22px; background:#fff; padding:12px 20px; border-radius:10px; box-shadow:0 10px 28px rgba(0,0,0,.28);}
.demo-pill{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; background:#fff; color:var(--red-dark); padding:4px 10px; border-radius:20px; margin-bottom:18px; font-weight:600;}
.hero h1{font-size:clamp(26px,4.5vw,38px); font-weight:700; color:#fff; max-width:640px; margin:0 auto;}
.hero p.sub{margin-top:12px; font-size:15.5px; color:#B9C3EA; max-width:520px; margin-left:auto; margin-right:auto; line-height:1.55;}

.role-grid{padding:36px 20px 60px; background:var(--fog);}
.role-cards{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:1100px; margin:0 auto;}
.role-card{background:var(--white); border:1px solid var(--steel-light); border-radius:var(--radius-lg); padding:24px 20px; text-align:left; box-shadow:var(--shadow); transition:transform .15s ease, box-shadow .15s ease; display:flex; flex-direction:column; gap:10px; min-height:190px;}
.role-card:hover{transform:translateY(-3px); box-shadow:0 8px 24px rgba(20,48,158,.12);}
.role-icon{width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff;}
.role-icon svg{width:19px; height:19px;}
.monogram svg{width:18px; height:18px;}
.btn svg{width:14px; height:14px; vertical-align:-2px; margin-right:5px;}
.brand-strip{background:var(--navy-dark); padding:16px 20px; display:flex; align-items:center; justify-content:center; gap:9px;}
.brand-strip img{height:17px; background:#fff; padding:4px 9px; border-radius:5px; display:block;}
.brand-strip span{color:#B9C3EA; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:600;}
.role-card h3{font-size:16px; color:var(--graphite);}
.role-card p{font-size:13px; color:var(--ink); line-height:1.5; flex:1;}
.role-card .go{font-size:12.5px; font-weight:600; color:var(--navy); display:flex; align-items:center; gap:5px;}
@media (max-width:900px){.role-cards{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.role-cards{grid-template-columns:1fr;}}

/* ---------- Generic page header (inside flows) ---------- */
.page-head{position:relative; padding:28px 20px 20px; background:var(--white); border-bottom:1px solid var(--steel-light);}
.page-head::before{content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--navy) 0%, var(--navy) 38%, var(--red) 55%, var(--steel) 78%, var(--steel-light) 100%);}
.breadcrumb{font-size:12.5px; color:var(--steel); font-family:'IBM Plex Mono',monospace; margin-bottom:8px;}
.breadcrumb button{background:none;border:none;color:var(--navy);font-family:inherit;font-size:inherit;padding:0;font-weight:600;}
.page-head h2{font-size:22px; color:var(--navy-dark);}
.page-head .desc{margin-top:6px; font-size:13.5px; color:var(--ink);}

.content-pad{padding:26px 20px 60px;}

/* ---------- Choice grids (entreprise / agence) ---------- */
.choice-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; max-width:960px; margin:0 auto;}
@media (max-width:760px){.choice-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:480px){.choice-grid{grid-template-columns:1fr;}}
.choice-card{background:var(--white); border:1px solid var(--steel-light); border-radius:var(--radius-lg); padding:20px; text-align:left; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow);}
.choice-card:hover{border-color:var(--navy-light);}
.monogram{width:46px; height:46px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; flex-shrink:0; overflow:hidden;}
.monogram.has-logo{background:#fff; border:1px solid var(--steel-light); padding:6px;}
.monogram.has-logo img{width:100%; height:100%; object-fit:contain;}
.avatar{width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13.5px; flex-shrink:0; overflow:hidden;}
.avatar.has-photo{background:var(--fog);}
.avatar.has-photo img{width:100%; height:100%; object-fit:cover;}
.upload-row{display:flex; align-items:center; gap:12px; margin-top:8px;}
.upload-row .preview-box{width:52px; height:52px; border-radius:8px; border:1px dashed var(--steel-light); background:var(--fog); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;}
.upload-row .preview-box img{width:100%; height:100%; object-fit:cover;}
.upload-row .preview-box.logo-box img{object-fit:contain; padding:4px; background:#fff;}
.file-input-wrap input[type=file]{font-size:12px;}
.choice-card .meta strong{display:block; font-size:14.5px; color:var(--graphite);}
.choice-card .meta span{font-size:12px; color:var(--steel); font-family:'IBM Plex Mono',monospace;}

/* ---------- Forms / login ---------- */
.form-card{background:var(--white); border:1px solid var(--steel-light); border-radius:var(--radius-lg); padding:28px; max-width:400px; margin:0 auto; box-shadow:var(--shadow);}
.form-card .form-head{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
.form-card .form-head .monogram{width:40px;height:40px;}
label{display:block; font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:6px; margin-top:14px;}
label:first-of-type{margin-top:0;}
input,textarea,select{width:100%; padding:10px 12px; border:1px solid var(--steel-light); border-radius:var(--radius); font-family:inherit; font-size:14px; background:var(--fog); color:var(--graphite);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--navy-light); outline-offset:1px; background:#fff;}
textarea{resize:vertical; min-height:80px;}
.hint-box{margin-top:16px; background:var(--fog); border:1px dashed var(--steel-light); border-radius:var(--radius); padding:10px 12px; font-size:12px; color:var(--ink); font-family:'IBM Plex Mono',monospace; line-height:1.6;}
.error-box{margin-top:12px; background:var(--danger-bg); color:var(--red-dark); border-radius:var(--radius); padding:9px 12px; font-size:13px; display:none;}
.error-box.show{display:block;}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 18px; border-radius:var(--radius); font-size:14px; font-weight:600; border:none; transition:opacity .15s;}
.btn:hover{opacity:.9;}
.btn-primary{background:var(--navy); color:#fff;}
.btn-danger{background:var(--red); color:#fff;}
.btn-outline{background:#fff; border:1px solid var(--steel-light); color:var(--graphite);}
.btn-success{background:var(--success); color:#fff;}
.btn-block{width:100%; margin-top:20px;}
.btn-sm{padding:7px 12px; font-size:12.5px;}

/* ---------- Dashboard shells ---------- */
.dash-tabs{display:flex; gap:4px; padding:0 20px; background:var(--white); border-bottom:1px solid var(--steel-light); overflow-x:auto;}
.dash-tab{padding:14px 16px; font-size:13.5px; font-weight:600; color:var(--steel); border-bottom:2px solid transparent; white-space:nowrap; background:none; border-left:none;border-right:none;border-top:none;}
.dash-tab.active{color:var(--navy); border-bottom-color:var(--navy);}

.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:26px;}
@media (max-width:760px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff; border:1px solid var(--steel-light); border-radius:var(--radius-lg); padding:16px 18px; box-shadow:var(--shadow);}
.stat-card .num{font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; color:var(--navy-dark);}
.stat-card .lbl{font-size:12px; color:var(--ink); margin-top:2px;}

.section-title{font-size:15px; font-weight:700; color:var(--graphite); margin:30px 0 14px; display:flex; align-items:center; justify-content:space-between;}
.section-title:first-child{margin-top:0;}

.card-list{display:flex; flex-direction:column; gap:10px;}
.item-card{background:#fff; border:1px solid var(--steel-light); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
.item-main{flex:1; min-width:200px;}
.item-id{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--steel); margin-bottom:3px;}
.item-title{font-size:14.5px; font-weight:600; color:var(--graphite);}
.item-sub{font-size:12.5px; color:var(--ink); margin-top:3px;}
.item-actions{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}

.badge{display:inline-block; font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.02em;}
.badge-red{background:var(--danger-bg); color:var(--red-dark);}
.badge-amber{background:var(--amber-bg); color:var(--amber);}
.badge-blue{background:#E5EAFB; color:var(--navy);}
.badge-green{background:var(--success-bg); color:var(--success);}

.empty-state{text-align:center; padding:36px 20px; color:var(--steel); font-size:13.5px; background:#fff; border:1px dashed var(--steel-light); border-radius:var(--radius-lg);}

.client-block{margin-bottom:26px;}
.client-header{display:flex; align-items:center; gap:12px; padding:14px 16px; background:#fff; border:1px solid var(--steel-light); border-radius:var(--radius); margin-bottom:10px; cursor:pointer;}
.client-header .meta strong{font-size:15px;}
.client-header .meta span{font-size:12px; color:var(--steel); font-family:'IBM Plex Mono',monospace;}
.agence-sub-list{margin-left:14px; padding-left:20px; border-left:2px solid var(--steel-light); display:flex; flex-direction:column; gap:8px;}

/* ---------- Modal ---------- */
#modalOverlay{position:fixed; inset:0; background:rgba(10,27,92,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:16px;}
#modalOverlay.show{display:flex;}
.modal-box{background:#fff; border-radius:var(--radius-lg); width:100%; max-width:480px; max-height:88vh; overflow-y:auto; padding:26px; box-shadow:0 20px 60px rgba(10,27,92,.3);}
.modal-box h3{font-size:17px; color:var(--navy-dark); margin-bottom:4px;}
.modal-box .modal-sub{font-size:12.5px; color:var(--steel); margin-bottom:16px;}
.modal-close-row{display:flex; justify-content:flex-end; gap:10px; margin-top:22px;}
.photo-thumbs{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.photo-thumb{width:64px; height:64px; border-radius:var(--radius); background:var(--fog); border:1px solid var(--steel-light); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative;}
.photo-thumb img{width:100%; height:100%; object-fit:cover;}

/* ---------- Report detail (read-only) ---------- */
.report-view{background:#fff; border:1px solid var(--steel-light); border-radius:var(--radius-lg); padding:22px;}
.report-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0; font-size:13px;}
.report-grid .k{color:var(--steel); font-size:11px; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; margin-bottom:2px;}
.report-grid .v{color:var(--graphite); font-weight:600;}
.report-text{background:var(--fog); border-radius:var(--radius); padding:14px; font-size:13.5px; line-height:1.6; margin-top:6px;}
.report-photos{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;}
.report-photos .ph{width:110px; height:88px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--steel-light);}
.report-photos .ph img{width:100%;height:100%;object-fit:cover;}

/* ---------- Print ---------- */
footer.demo-footer{text-align:center; padding:22px 20px 34px; font-size:11.5px; color:var(--steel); background:var(--fog);}

.login-shell{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:var(--fog);}
.login-shell .lockup{display:flex; flex-direction:column; align-items:center; margin-bottom:26px;}
.login-shell .lockup img{height:44px; margin-bottom:12px;}
.login-shell .lockup span{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--steel);}
.toggle-link{display:block; text-align:center; margin-top:16px; font-size:12.5px; color:var(--navy); font-weight:600; background:none; border:none; text-decoration:underline; cursor:pointer;}
.saving-note{font-size:12px; color:var(--steel); margin-top:10px; text-align:center;}
.rules-banner{background:var(--danger-bg); color:var(--red-dark); border-radius:var(--radius); padding:14px 16px; font-size:13px; line-height:1.6; margin-bottom:20px;}
.rules-banner code{background:#fff; padding:2px 6px; border-radius:4px; font-family:'IBM Plex Mono',monospace; word-break:break-all;}
.uid-box{background:var(--fog); border:1px dashed var(--steel-light); border-radius:var(--radius); padding:12px 14px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; word-break:break-all; margin:10px 0;}
</style>
</head>
<body>

<div id="app">

  <div id="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <img class="js-logo-src" alt="IEBS">
        <span class="topbar-role" id="topbarRoleLabel"></span>
      </div>
      <div class="topbar-actions">
        <button class="btn-ghost-light" onclick="showUidModal()">Mon compte</button>
        <button class="btn-ghost-light" onclick="doLogout()">Se déconnecter</button>
      </div>
    </div>
  </div>

  <!-- ============ LOGIN / SETUP ============ -->
  <section id="view-login" class="view">
    <div class="login-shell">
      <div class="lockup">
        <img class="js-logo-src" alt="IEBS">
        <span>SAV Connect · Espace Gestionnaire</span>
      </div>

      <div class="form-card" id="loginFormCard">
        <label>Adresse e-mail</label>
        <input type="email" id="gestLoginUser" placeholder="toi@exemple.com">
        <label>Mot de passe</label>
        <input type="password" id="gestLoginPass" placeholder="••••••••">
        <div class="error-box" id="gestLoginError">Identifiants incorrects.</div>
        <button class="btn btn-primary btn-block" onclick="attemptGestLogin()">Se connecter</button>
        <button class="toggle-link" onclick="showForgotPassword()">Mot de passe oublié ?</button>
        <button class="toggle-link" onclick="toggleSetupForm(true)">Première utilisation ? Créer le compte administrateur</button>
      </div>

      <div class="form-card hidden" id="setupFormCard">
        <h3 style="font-size:15px;margin-bottom:4px;">Créer le compte administrateur</h3>
        <div class="modal-sub">À faire une seule fois, à la création de la plateforme.</div>
        <label>Ton adresse e-mail (utilisée en cas de mot de passe oublié)</label>
        <input type="email" id="newAdminUser" placeholder="toi@exemple.com">
        <label>Mot de passe (6 caractères minimum)</label>
        <input type="password" id="newAdminPass" placeholder="••••••••">
        <div class="error-box" id="setupError"></div>
        <button class="btn btn-primary btn-block" onclick="submitCreateAdmin()">Créer le compte</button>
        <button class="toggle-link" onclick="toggleSetupForm(false)">J'ai déjà un compte, me connecter</button>
      </div>
    </div>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="view-dashboard" class="view hidden">
    <div class="page-head" style="padding-bottom:0;">
      <div class="breadcrumb mono">ESPACE GESTIONNAIRE</div>
      <h2>Tableau de bord IEBS</h2>
    </div>
    <div class="dash-tabs">
      <button class="dash-tab active" data-tab="apercu" onclick="switchGestTab('apercu')">Aperçu</button>
      <button class="dash-tab" data-tab="clients" onclick="switchGestTab('clients')">Clients &amp; agences</button>
      <button class="dash-tab" data-tab="interventions" onclick="switchGestTab('interventions')">Interventions</button>
      <button class="dash-tab" data-tab="rapports" onclick="switchGestTab('rapports')">Rapports &amp; factures</button>
      <button class="dash-tab" data-tab="pros" onclick="switchGestTab('pros')">Techniciens</button>
      <button class="dash-tab" data-tab="documents" onclick="switchGestTab('documents')">Documents</button>
    </div>
    <div class="content-pad wrap-wide" id="gestTabContent"></div>
  </section>

</div>

<div id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<script type="module">
/* ======================================================================
   IEBS SAV CONNECT — ESPACE GESTIONNAIRE (connecté à Firebase)
   Projet Firebase : iebs-sav-connect
   ====================================================================== */
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {

import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8fhqppzpW0oqJnJSXDHUHn8_Fb0ANc4E",
  authDomain: "iebs-sav-connect.firebaseapp.com",
  projectId: "iebs-sav-connect",
  storageBucket: "iebs-sav-connect.firebasestorage.app",
  messagingSenderId: "26304949534",
  appId: "1:26304949534:web:1b252b3a26de097d132d0f"
};

const app = initializeApp(firebaseConfig, 'iebs-gestionnaire');
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "souldtbah84@gmail.com";
const EMAIL_SUFFIX_DG = "@dg.iebs-sav-connect.app";

let DB = { entreprises: [], agences: [], pros: [], interventions: [], documents: [] };
let currentTab = 'apercu';
let currentUser = null;

let rulesErrorSeen = false;

/* ---------------------- GENERIC HELPERS ---------------------- */
const MONO_COLORS = ["#14309E","#D91E36","#8B93A1","#187A54","#0A1B5C","#B4740E"];
function colorFor(str){
  let h=0; for(let i=0;i<str.length;i++){h=str.charCodeAt(i)+((h<<5)-h);}
  return MONO_COLORS[Math.abs(h)%MONO_COLORS.length];
}
function initials(str){
  return (str||"?").split(" ").filter(w=>w.length>0).slice(0,2).map(w=>w[0]).join("").toUpperCase();
}
function entLogoHtml(ent, style=''){
  if(ent.logoBase64){
    return `<div class="monogram has-logo" style="${style}"><img src="${ent.logoBase64}" alt="${ent.nom}"></div>`;
  }
  return `<div class="monogram" style="background:${colorFor(ent.nom)};${style}">${initials(ent.nom)}</div>`;
}
function proAvatarHtml(pro, style=''){
  if(pro.photoBase64){
    return `<div class="avatar has-photo" style="${style}"><img src="${pro.photoBase64}" alt="${pro.nom}"></div>`;
  }
  return `<div class="avatar" style="background:${colorFor(pro.nom)};${style}">${initials(pro.nom)}</div>`;
}
function fmtDate(ts){
  if(!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) + " à " + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function fmtGNF(n){ return (n||0).toLocaleString('fr-FR').replace(/,/g,' ') + " GNF"; }
function sanitizeUsername(s){
  return (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9._-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
}
function statusBadge(s){
  const map = {
    signalee:["Signalée","badge-red"], assignee:["Pro assigné","badge-amber"],
    terminee:["Rapport reçu","badge-blue"], facturee:["Facturée","badge-green"]
  };
  const [label,cls] = map[s] || ["—","badge-blue"];
  return `<span class="badge ${cls}">${label}</span>`;
}
const findEnt = id => DB.entreprises.find(e=>e.id===id) || {nom:"—"};
const findAgencesForEnt = entId => DB.agences.filter(a=>a.entrepriseId===entId);
const findAg = id => DB.agences.find(a=>a.id===id) || {nom:"—"};
const findPro = id => DB.pros.find(p=>p.id===id);
const findInt = id => DB.interventions.find(i=>i.id===id);

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));

}

}

/* ---------------------- AUTH ---------------------- */
function toggleSetupForm(showSetup){
  if(showSetup){
    const ok = confirm("⚠️ N'utilise ceci QUE si tu n'as jamais créé de compte administrateur.\n\nSi un compte existe déjà, cette action va en créer un second et cassera l'accès à tes données (il faudra reconfigurer les règles Firestore).\n\nContinuer quand même ?");
    if(!ok) return;
  }
  document.getElementById('loginFormCard').classList.toggle('hidden', showSetup);
  document.getElementById('setupFormCard').classList.toggle('hidden', !showSetup);
  document.getElementById('setupError').classList.remove('show');
}
async function attemptGestLogin(){
  const email = document.getElementById('gestLoginUser').value.trim().toLowerCase();
  const p = document.getElementById('gestLoginPass').value;
  const errBox = document.getElementById('gestLoginError');
  errBox.classList.remove('show');
  if(!email || !p){ errBox.textContent = "Merci de remplir les deux champs."; errBox.classList.add('show'); return; }
  try{
    await signInWithEmailAndPassword(auth, email, p);
  }catch(err){
    errBox.textContent = "E-mail ou mot de passe incorrect.";
    errBox.classList.add('show');
  }
}
async function submitCreateAdmin(){
  const email = document.getElementById('newAdminUser').value.trim().toLowerCase();
  const p = document.getElementById('newAdminPass').value;
  const errBox = document.getElementById('setupError');
  errBox.classList.remove('show');
  if(!email.includes('@') || p.length<6){
    errBox.textContent = "Indique une vraie adresse e-mail et un mot de passe d'au moins 6 caractères.";
    errBox.classList.add('show'); return;
  }
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, p);
    showAdminUidBanner(cred.user.uid);
  }catch(err){
    errBox.textContent = "Erreur : " + (err.message || err.code || "création impossible.");
    errBox.classList.add('show');
  }
}
async function submitForgotPassword(){
  const email = document.getElementById('forgotEmail').value.trim().toLowerCase();
  const box = document.getElementById('forgotResult');
  if(!email.includes('@')){ box.textContent = "Indique une adresse e-mail valide."; box.classList.add('show'); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    box.className = 'saving-note';
    box.style.color = 'var(--success)';
    box.textContent = "E-mail envoyé ! Vérifie ta boîte de réception (et les spams).";
  }catch(err){
    box.className = 'error-box show';
    box.textContent = "Erreur : " + (err.message || err.code);
  }
}
function showForgotPassword(){
  openModal(`
    <h3>Mot de passe oublié</h3>
    <div class="modal-sub">Reçois un lien de réinitialisation par e-mail</div>
    <label>Ton adresse e-mail (celle utilisée à la création du compte)</label>
    <input type="email" id="forgotEmail" placeholder="toi@exemple.com">
    <div id="forgotResult" style="margin-top:10px;"></div>
    <div class="modal-close-row">
      <button class="btn btn-outline" onclick="closeModal()">Fermer</button>
      <button class="btn btn-primary" onclick="submitForgotPassword()">Envoyer le lien</button>
    </div>`);
}

function showAdminUidBanner(uid){
  openModal(`

/* ---------------------- FIRESTORE LISTENERS ---------------------- */
let activeUnsubs = [];
let retryTimer = null;
function startListeners(){
  activeUnsubs.forEach(u=>{ try{ u(); }catch(e){} });
  activeUnsubs = [];
  activeUnsubs.push(onSnapshot(collection(db,'entreprises'), snap=>{
    DB.entreprises = snap.docs.map(d=>({id:d.id, ...d.data()}));
    clearRulesError();
    rerenderCurrentTab();
  }, handleFirestoreError));
  activeUnsubs.push(onSnapshot(collection(db,'agences'), snap=>{
    DB.agences = snap.docs.map(d=>({id:d.id, ...d.data()}));
    clearRulesError();
    rerenderCurrentTab();
  }, handleFirestoreError));
  activeUnsubs.push(onSnapshot(collection(db,'pros'), snap=>{
    DB.pros = snap.docs.map(d=>({id:d.id, ...d.data()}));
    clearRulesError();
    rerenderCurrentTab();
  }, handleFirestoreError));
  activeUnsubs.push(onSnapshot(query(collection(db,'interventions'), orderBy('dateSignalement','desc')), snap=>{
    DB.interventions = snap.docs.map(d=>({id:d.id, ...d.data()}));
    clearRulesError();
    rerenderCurrentTab();
  }, handleFirestoreError));
  activeUnsubs.push(onSnapshot(query(collection(db,'documents'), orderBy('createdAt','desc')), snap=>{
    DB.documents = snap.docs.map(d=>({id:d.id, ...d.data()}));
    clearRulesError();
    rerenderCurrentTab();
  }, handleFirestoreError));
}
function clearRulesError(){
  if(rulesErrorSeen){ rulesErrorSeen = false; rerenderCurrentTab(); }
}
function handleFirestoreError(err){
  if(err && err.code === 'permission-denied'){
    if(!rulesErrorSeen){ rulesErrorSeen = true; rerenderCurrentTab(); }
    if(!retryTimer){
      retryTimer = setTimeout(()=>{ retryTimer = null; startListeners(); }, 4000);
    }
  }
}

/* ---------------------- IMAGE HANDLING (stored as compressed base64 directly in Firestore, no Storage needed) ---------------------- */
let tempUploadBase64 = null;
function compressImageToDataURL(file, maxDim=340, quality=0.75){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lecture du fichier impossible."));
    reader.onload = e=>{
      const img = new Image();
      img.onerror = () => reject(new Error("Image invalide."));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>=h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h>w && h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function handleFileSelect(e, previewId, isLogo){
  const f = e.target.files[0];
  if(!f) return;
  const box = document.getElementById(previewId);
  box.textContent = '…';
  try{
    tempUploadBase64 = await compressImageToDataURL(f);
    box.className = isLogo ? 'preview-box logo-box' : 'preview-box';
    box.innerHTML = `<img src="${tempUploadBase64}">`;
  }catch(err){
    box.textContent = 'Erreur';
    tempUploadBase64 = null;
  }
}
async function createLoginAccount(email, password){
  const secondaryApp = initializeApp(firebaseConfig, 'secondary-' + Date.now());
  const secondaryAuth = getAuth(secondaryApp);
  const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
  const uid = cred.user.uid;
  await signOut(secondaryAuth);
  await deleteApp(secondaryApp);
  return uid;
}

function openAssignerModal(interventionId){
  const it = findInt(interventionId);
  if(!DB.pros.length){ alert("Ajoute d'abord un technicien dans l'onglet « Techniciens »."); return; }
  const currentPro = it.proId ? findPro(it.proId) : null;
  openModal(`
    <h3>${it.proId ? 'Réassigner' : 'Assigner'} un technicien</h3>
    <div class="modal-sub">${it.description}</div>
    ${currentPro ? `<p style="font-size:12.5px;color:var(--ink);">Actuellement : ${currentPro.nom}</p>` : ''}
    ${it.rapport ? `<div class="error-box show">Un rapport existe déjà pour cette intervention. Réassigner effacera ce rapport — le nouveau technicien devra en envoyer un nouveau.</div>` : ''}
    <label>Technicien</label>
    <select id="assignProSelect">
      ${DB.pros.map(p=>`<option value="${p.id}" ${p.id===it.proId?'selected':''}>${p.nom} — ${p.specialite||''}</option>`).join("")}
    </select>
    <div class="modal-close-row">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="submitAssignation('${interventionId}')">${it.proId ? 'Réassigner' : 'Assigner'}</button>
    </div>`);
}
async function submitAssignation(interventionId){
  const proId = document.getElementById('assignProSelect').value;
  const pro = findPro(proId);
  try{
    await updateDoc(doc(db,'interventions',interventionId), {
      proId, proAuthUid: pro.authUid || null, dateAssignation: serverTimestamp(), statut:'assignee', rapport: null
    });
    closeModal();
    switchGestTab('interventions');
  }catch(err){ alert("Erreur : " + (err.message||err.code)); }
}

function openFactureModal(interventionId){
  openModal(`
    <h3>Émettre la facture</h3>
    <div class="modal-sub">${interventionId.slice(0,6)}…</div>
    <label>Montant (GNF)</label>

    <div class="modal-close-row">

      <button class="btn btn-success" onclick="submitFacture('${interventionId}')">Émettre</button>
    </div>`);
}
async function submitFacture(interventionId){
  const montant = parseInt(document.getElementById('factureMontant').value, 10);
  if(!montant || montant<=0){ alert("Merci d'indiquer un montant valide."); return; }
  const facturedCount = DB.interventions.filter(i=>i.facture).length;
  const numero = 'F-' + new Date().getFullYear() + '-' + String(facturedCount+1).padStart(4,'0');
  try{
    await updateDoc(doc(db,'interventions',interventionId), {
      facture:{ numero, montant, date: new Date().toISOString() }, statut:'facturee'
    });
    closeModal();
    switchGestTab('rapports');
  }catch(err){ alert("Erreur : " + (err.message||err.code)); }
}

function buildPrintableDoc(i){
  return `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>${i.id} — Rapport IEBS</title>
<style>
  *{box-sizing:border-box;}

  .report-grid .v{color:#20242B; font-weight:700;}
  .report-text{background:#F3F5F9; border-radius:6px; padding:13px; font-size:13px; line-height:1.6; margin-top:6px;}
  .report-photos{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;}
  .report-photos .ph{width:140px; height:104px; border-radius:6px; overflow:hidden; border:1px solid #DCE1E9;}

  .badge{display:inline-block; font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase;}
  .badge-red{background:#FBE6E9; color:#A8142A;} .badge-amber{background:#FBF0DC; color:#B4740E;}
  .badge-blue{background:#E5EAFB; color:#14309E;} .badge-green{background:#E4F5EC; color:#187A54;}
  .doc-footer{margin-top:30px; padding-top:14px; border-top:1px solid #DCE1E9; font-size:10.5px; color:#8B93A1; text-align:center;}

  @media print{ body{padding:14px;} .print-hint{display:none;} }
</style></head>
<body>
  <div class="print-hint">Ce document s'imprime automatiquement. Si rien ne se passe, faites Ctrl+P (ou Cmd+P sur Mac).</div>
  <div class="doc-header">
    <img src="${LOGO}">
    <div><h1>Rapport d'intervention</h1><div class="tag">Les Ingénieurs d'Electricités et BTP Service de Guinée</div></div>
  </div>
  ${reportHtml(i)}
  <div class="doc-footer">${IEBS_FOOTER_LINE}</div>
  <script>window.addEventListener('load', function(){ setTimeout(function(){ window.print(); }, 250); });<\/script>
</body></html>`;
}
function printRapport(interventionId){
  const i = findInt(interventionId);
  const htmlDoc = buildPrintableDoc(i);
  const win = window.open('', '_blank');
  if(win){
    win.document.open();
    win.document.write(htmlDoc);
    win.document.close();
    return;
  }
  // Fallback if pop-ups are blocked: download the file instead
  const blob = new Blob([htmlDoc], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const filename = i.id + '-rapport-IEBS.html';
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 8000);
  openModal(`
    <h3>Fenêtre bloquée par le navigateur</h3>
    <div class="modal-sub">${filename} a été téléchargé à la place</div>
    <p style="font-size:13.5px;line-height:1.6;color:var(--ink);margin-top:2px;">Autorise les pop-ups pour ce site (icône dans la barre d'adresse) pour que l'impression s'ouvre directement la prochaine fois. En attendant, ouvre le fichier téléchargé : l'impression se lance automatiquement.</p>
    <div class="modal-close-row"><button class="btn btn-primary" onclick="closeModal()">Compris</button></div>`);
}
